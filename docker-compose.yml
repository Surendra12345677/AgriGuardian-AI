# ──────────────────────────────────────────────────────────────
# AgriGuardian AI — local development stack
#
# Usage (PowerShell):
#   docker compose up -d            # start mongo + app in background
#   docker compose logs -f app      # tail app logs
#   docker compose down             # stop & remove containers
#
# Then open:
#   http://localhost:3000                       (Next.js dashboard)
#   http://localhost:8080/swagger-ui.html       (Spring Boot API)
#   http://localhost:8080/actuator/health
#   http://localhost:3100/mcp                   (MongoDB MCP server)
# ──────────────────────────────────────────────────────────────

services:
  mongo:
    image: mongo:7
    container_name: agriguardian-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ───────────────────────────────────────────────────────────────
  # MongoDB MCP server — SECONDARY action tool (NOT our partner track).
  # Our hackathon partner track is **Arize** (see ArizeMcpConfig + README).
  # This sidecar lets the agent persist farm plans via JSON-RPC 2.0 /
  # Streamable-HTTP at http://mongodb-mcp:3000/mcp.
  # Image: official MongoDB Labs MCP server.
  # ───────────────────────────────────────────────────────────────
  mongodb-mcp:
    image: mongodb/mongodb-mcp-server:latest
    container_name: agriguardian-mongodb-mcp
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MDB_MCP_CONNECTION_STRING: mongodb://mongo:27017/agriguardian
      MDB_MCP_TRANSPORT: http
      MDB_MCP_HTTP_PORT: "3000"
      MDB_MCP_HTTP_HOST: "0.0.0.0"
      # Read-only by default; flip to false to enable write tools (insert/update/delete)
      MDB_MCP_READ_ONLY: "false"
    ports:
      - "3100:3000"   # host 3100 → container 3000 (web takes host 3000)

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agriguardian-app
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      mongodb-mcp:
        condition: service_started
    environment:
      PORT: 8080
      SPRING_PROFILES_ACTIVE: dev
      MONGODB_URI: mongodb://mongo:27017/agriguardian
      # Pulled from .env (docker compose auto-loads it). Empty → stub mode.
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3-pro}
      GEMINI_STUB_MODE: ${GEMINI_STUB_MODE:-auto}
      # Arize AX — observability (partner-track channel)
      ARIZE_ENABLED:        ${ARIZE_ENABLED:-false}
      ARIZE_API_KEY:        ${ARIZE_API_KEY:-}
      ARIZE_SPACE_ID:       ${ARIZE_SPACE_ID:-}
      ARIZE_OTLP_ENDPOINT:  ${ARIZE_OTLP_ENDPOINT:-https://otlp.arize.com/v1}
      # Arize MCP — partner-track qualifier
      MCP_ARIZE_ENABLED:    ${MCP_ARIZE_ENABLED:-false}
      MCP_ARIZE_URL:        ${MCP_ARIZE_URL:-}
      MCP_ARIZE_API_KEY:    ${MCP_ARIZE_API_KEY:-}
      MCP_ARIZE_SPACE_ID:   ${MCP_ARIZE_SPACE_ID:-}
      # MongoDB MCP — secondary action tool
      MCP_MONGODB_ENABLED: "true"
      MCP_MONGODB_URL: "http://mongodb-mcp:3000/mcp"
    ports:
      - "8080:8080"

  # ───────────────────────────────────────────────────────────────
  # Next.js 15 demo frontend (App Router · React 19 · Tailwind).
  # Talks to the Spring Boot app via the BACKEND_URL rewrite — no CORS.
  # ───────────────────────────────────────────────────────────────
  web:
    image: node:20-alpine
    container_name: agriguardian-web
    working_dir: /app
    command: sh -c "npm install --no-audit --no-fund && npm run dev -- -H 0.0.0.0"
    depends_on:
      - app
    environment:
      BACKEND_URL: http://app:8080
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - ./web:/app
      - web-node-modules:/app/node_modules
    ports:
      - "3000:3000"

volumes:
  mongo-data:
    driver: local
  web-node-modules:
    driver: local

