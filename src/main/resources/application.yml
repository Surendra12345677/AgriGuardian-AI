spring:
  application:
    name: agriguardian-ai
  # Auto-import local dev secrets (Mongo Atlas URI, Gemini key) when present.
  # The file is git-ignored, so this is safe in CI / prod where it won't exist.
  config:
    import: optional:file:./secrets/application-secrets.properties
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/agriguardian}
      auto-index-creation: true
  threads:
    virtual:
      enabled: true

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,caches,circuitbreakers
  endpoint:
    health:
      show-details: when-authorized
  health:
    circuitbreakers:
      enabled: true
  metrics:
    tags:
      application: agriguardian-ai

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

agriguardian:
  gemini:
    api-key: ${GEMINI_API_KEY:}
    # gemini-3-pro = hackathon-required Gemini 3 reasoning model.
    # gemini-3-flash is also available for lower latency / cost.
    model: ${GEMINI_MODEL:gemini-3-pro}
    base-url: https://generativelanguage.googleapis.com/v1beta
    stub-mode: ${GEMINI_STUB_MODE:auto}   # auto | always | never
    timeout-seconds: 30
  # ── Arize AX — hackathon PARTNER TRACK (Arize bucket) ─────────────────
  # Arize gives the agent observability + evaluation "superpowers":
  # every Gemini call + tool invocation is traced via OpenTelemetry to
  # Arize, and the agent uses the Arize MCP server to query its own
  # eval results and self-correct. This is what qualifies the project
  # for the Arize partner bucket.
  arize:
    enabled: ${ARIZE_ENABLED:false}
    api-key: ${ARIZE_API_KEY:}
    space-id: ${ARIZE_SPACE_ID:}
    otlp-endpoint: ${ARIZE_OTLP_ENDPOINT:https://otlp.arize.com/v1}
    project-name: ${ARIZE_PROJECT_NAME:agriguardian-ai}
  mcp:
    # Arize MCP — partner-track qualifier (primary integration).
    # JSON-RPC 2.0 over HTTP/SSE. Keys are passed as request headers.
    arize:
      enabled: ${MCP_ARIZE_ENABLED:false}
      url: ${MCP_ARIZE_URL:https://mcp.arize.com/v1}
      api-key: ${ARIZE_API_KEY:}
      space-id: ${ARIZE_SPACE_ID:}
      timeout-seconds: 15
    # Secondary, optional: MongoDB MCP for action-taking (persisting
    # farm plans). NOT our partner-track submission.
    mongodb:
      enabled: ${MCP_MONGODB_ENABLED:false}
      url: ${MCP_MONGODB_URL:http://localhost:3000/mcp}
      timeout-seconds: 15
  weather:
    base-url: https://api.open-meteo.com/v1
  market:
    # Mock market price source (deterministic + trend simulation)
    use-mock: true

logging:
  level:
    root: INFO
    com.Hackathon.AgriGuardian: DEBUG
  pattern:
    # Include the X-Request-Id (set by CorrelationIdFilter) in every log line.
    level: "%5p [requestId=%X{requestId:-}]"

# ── Resilience4j — circuit breaker / retry for outbound HTTP ───────────
resilience4j:
  circuitbreaker:
    instances:
      openMeteo:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50          # %
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
      mongoMcp:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 3
        failureRateThreshold: 60
        waitDurationInOpenState: 20s
        permittedNumberOfCallsInHalfOpenState: 2
        automaticTransitionFromOpenToHalfOpenEnabled: true
  retry:
    instances:
      openMeteo:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2.0
        retryExceptions:
          - org.springframework.web.client.RestClientException
          - java.io.IOException
      mongoMcp:
        maxAttempts: 2
        waitDuration: 300ms
        retryExceptions:
          - com.Hackathon.AgriGuardian.AI.mcp.McpClient$McpException

---
spring:
  config:
    activate:
      on-profile: test
  data:
    mongodb:
      uri: mongodb://localhost:27017/agriguardian-test
agriguardian:
  gemini:
    stub-mode: always

